<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Flow</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      text-align: center;
    }

    .box {
      width: 300px;
      background: white;
      margin: 80px auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #43a4ff;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #2fe8d6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- STEP 1 -->
<div class="box" id="step1">
  <h2>Welcome 👋</h2>
  <p>Create your account</p>
  <button onclick="nextStep(2)">Get Started</button>
</div>

<!-- STEP 2 -->
<div class="box hidden" id="step2">
  <h2>Basic Info</h2>
  <input type="text" placeholder="Enter Name">
  <input type="email" placeholder="Enter Email">
  <input type="text" placeholder="Enter Phone">
  <button onclick="nextStep(3)">Next</button>
</div>

<!-- STEP 3 -->
<div class="box hidden" id="step3">
  <h2>Interests</h2>
  <label><input type="checkbox"> Food</label><br>
  <label><input type="checkbox"> Travel</label><br>
  <label><input type="checkbox"> Music</label><br><br>
  <button onclick="nextStep(4)">Next</button>
</div>

<!-- STEP 4 -->
<div class="box hidden" id="step4">
  <h2>Security</h2>
  <input type="password" placeholder="Password">
  <input type="password" placeholder="Confirm Password">
  <button onclick="nextStep(5)">Sign Up</button>
</div>

<!-- SUCCESS -->
<div class="box hidden" id="step5">
  <h2>🎉 Success!</h2>
  <p>Account Created Successfully</p>
  <button onclick="location.reload()">Finish</button>
</div>

<script>
function nextStep(step) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById("step" + i).classList.add("hidden");
  }
  document.getElementById("step" + step).classList.remove("hidden");
}
</script>

</body>
</html>
